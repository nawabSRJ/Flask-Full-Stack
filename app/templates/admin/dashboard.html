<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        body {
            background-color: #f8f9fa;
            min-height: 100vh;
        }
        .navbar-custom {
            background-color: #ffffff;
            border-bottom: 1px solid #e5e7eb;
            padding: 12px 24px;
        }
    </style>
  </head>
  <body>

    <!-- Navbar -->
    <div class="navbar-custom d-flex align-items-center justify-content-between mb-5">
        <a class="text-decoration-none fw-semibold fs-5 text-dark"
           href="{{url_for('admin.admin_dashboard')}}">
            Admin Dashboard
        </a>
        <form action="{{url_for('admin.admin_logout')}}" method="post">
            <button type="submit" class="btn btn-outline-danger btn-sm px-3">
                Logout
            </button>
        </form>
    </div>

    <div class="container">

        <!-- heading + count -->
        <div class="d-flex align-items-center justify-content-between mb-4">
            <div>
                <h2 class="fw-bold mb-0">Users</h2>
                <p class="text-muted mb-0" style="font-size: 13px;">All registered users on the platform</p>
            </div>
            <span class="bg-primary bg-opacity-10 text-primary fw-semibold px-5 py-2 rounded-pill">
                {{ users|length }} total
            </span>
        </div>

        <div class="row g-4">   
            {% for user in users %}
                <div class="col-md-4">
                    <div class="card h-100 shadow-sm border-0 rounded-3 d-flex flex-column">
                        <div class="card-body d-flex flex-row align-items-flex-start gap-3 p-4 overflow-hidden">

                            <!-- photo -->
                            <div class="flex-shrink-0">
                                {% if user.photo %}
                                    <img src="{{ url_for('static', filename='uploads/' + user.photo) }}"
                                         class="rounded-2"
                                         style="width: 100px; height: 100px; object-fit: cover;"
                                         alt="User Photo">
                                {% else %}
                                    <!-- fallback : first letter of user name -->
                                    <div class="rounded-2 bg-primary bg-opacity-10 d-flex align-items-center justify-content-center"
                                         style="width: 56px; height: 56px;">
                                        <span class="text-primary fw-bold fs-5">{{ user.name[0].upper() }}</span>
                                    </div>
                                {% endif %}
                            </div>

                            <!-- info -->
                            <div class="flex-grow-1 min-w-0">
                                <h6 class="fw-bold mb-1 text-truncate" style="font-size: 20px;">{{ user.name }}</h6>
                                <p class="text-muted mb-2 text-truncate" style="font-size: 16px;">{{ user.email }}</p>
                                <span class="badge bg-secondary bg-opacity-10 text-secondary" style="font-size: 11px;">
                                    {{ user.course }}
                                </span>
                            </div>
                        </div>

                        <!-- actions -->
                        <div class="card-footer bg-transparent border-top-0 p-3 pt-0">
                            <form action="{{ url_for('admin.delete_user', user_id=user.id) }}" method="POST" onsubmit="return confirm('Are you sure you want to delete this user?');">
                                <button type="submit" class="btn btn-outline-danger btn-sm btn-block w-100">
                                    Delete
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            {% endfor %}
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
