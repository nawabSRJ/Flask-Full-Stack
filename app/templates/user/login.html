<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>User Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <h1 class="h1 text-center text-dark my-3">Login</h1>
    <blockquote class="blockquote text-center">Welcome back! Please login to continue</blockquote>

    <div class="container m-auto bg-light rounded-2 p-4" style="max-width: 500px;">

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form action="" method="POST">

            <!-- email -->
            <div class="entry d-flex flex-column gap-0 mb-3">
                <label class="form-label" for="email">Email:</label>
                <input class="form-control" type="email" name="email" id="email"
                    placeholder="Your email" required>
            </div>

            <!-- password -->
            <div class="entry d-flex flex-column gap-0 mb-3">
                <label class="form-label" for="password">Password:</label>
                <input class="form-control" type="password" name="password" id="password"
                    placeholder="Your password" required>
            </div>

            <div class="submit-btn w-100 d-flex justify-content-center mt-4">
                <button type="submit" class="btn btn-success m-auto px-4 rounded-pill fs-5">Login</button>
            </div>

            <p class="text-center text-muted mt-3">
                Don't have an account?
                <a href="{{ url_for('user.signup_page') }}">Sign up here</a>
            </p>

        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
