<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>User Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        body {
            background-color: #f8f9fa;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .form-control:focus {
            border-color: #198754;
            box-shadow: 0 0 0 3px rgba(25, 135, 84, 0.12);
        }
        .form-label {
            font-weight: 500;
            font-size: 14px;
            color: #374151;
            margin-bottom: 5px;
        }
        .card-wrapper {
            box-shadow: 0 2px 16px rgba(0,0,0,0.07);
            border-radius: 14px;
        }
        /* makes the form card section grow and center its content */
        .form-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
    </style>
</head>

<body>

    <!-- heading sits at the top naturally -->
    <div class="text-center mt-4">
        <h1 class="h3 fw-bold text-dark mb-2">Welcome Back</h1>
        <p class="text-muted" style="font-size: 14px;">Please login to continue</p>
    </div>

    <!-- form section grows to fill remaining space and centers the card -->
    <div class="form-section">
        <div class="bg-white card-wrapper p-4 p-md-5 w-100" style="max-width: 480px;">

            {% if error %}
            <div class="alert alert-danger py-2" style="font-size: 14px;">{{ error }}</div>
            {% endif %}

            <form action="" method="POST">

                <!-- email -->
                <div class="entry d-flex flex-column gap-0 mb-3">
                    <label class="form-label" for="email">Email:</label>
                    <input class="form-control" type="email" name="email" id="email"
                        placeholder="Your email" required>
                </div>

                <!-- password -->
                <div class="entry d-flex flex-column gap-0 mb-3">
                    <label class="form-label" for="password">Password:</label>
                    <input class="form-control" type="password" name="password" id="password"
                        placeholder="Your password" required>
                </div>

                <div class="submit-btn w-100 d-flex justify-content-center mt-4">
                    <button type="submit"
                            class="btn btn-success m-auto px-5 rounded-pill fs-6 fw-semibold"
                            style="padding-top: 10px; padding-bottom: 10px;">
                        Login
                    </button>
                </div>

                <p class="text-center text-muted mt-4 mb-0" style="font-size: 14px;">
                    Don't have an account?
                    <a href="{{ url_for('user.signup_page') }}" class="text-success fw-semibold text-decoration-none">
                        Sign up here
                    </a>
                </p>

            </form>
        </div>
    </div>
    <!-- end form section -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
