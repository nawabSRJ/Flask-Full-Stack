<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="p-4">
    {% if not user %}
    <p>You are not logged in.</p>

    {% else %}
    <div class="navbar navbar-expland-lg d-flex gap-3 mb-3 bg-light p-2 rounded-2">
        <a class="nav-link fs-3 text-dark" href="{{url_for('user.dashboard')}}">Dashboard</a>
        <form action="{{url_for('user.logout')}}" method="post">
            <button type="submit" class="btn btn-danger">Logout</button>
        </form>
    </div>
    <h1 class="h1 text-center">Welcome, {{ user.name }}!</h1>
    <div class="container user-details bg-light rounded-2 p-4 my-3" style="max-width: 700px;">
        <table class="table table-bordered table-striped bg-light table-hover">
            <thead>
                <tr>
                    <th>User Details</th>
                    <th>Value</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Email:</td>
                    <td>{{user.email}}</td>
                </tr>
                <tr>
                    <td>Phone:</td>
                    <td>{{user.phone}}</td>
                </tr>
                <tr>
                    <td>Age:</td>
                    <td>{{user.age}}</td>
                </tr>
                <tr>
                    <td>Gender:</td>
                    <td>{{user.gender}}</td>
                </tr>
                <tr>
                    <td>Course:</td>
                    <td>{{user.course}}</td>
                </tr>
            </tbody>
        </table>
    </div>
<!-- 
    <form action="{{url_for('user.logout')}}" method="post">
        
    </form> -->

    {% endif %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
