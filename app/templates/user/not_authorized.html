<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Access Denied</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        body {
            background-color: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .lock-circle {
            width: 80px; height: 80px;
            border-radius: 50%;
            background: #f1f3f5;
            border: 1px solid #e5e7eb;
            display: flex; align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }
    </style>
</head>
<body>
    <div class="card border-0 shadow-sm text-center p-5" style="max-width:420px; border-radius:16px;">

        <div class="lock-circle">
            <i class="ti ti-lock" style="font-size:32px; color:#6b7280;"></i>
        </div>

        <div class="d-inline-flex align-items-center gap-2 badge mb-4 justify-content-center"
             style="background:#FEF9E7; color:#B7770D; border:1px solid #FDE68A;
                    font-size:12px; font-weight:500; padding:6px 12px; border-radius:8px;">
            <i class="ti ti-info-circle"></i>
            You tried to access /dashboard
        </div>

        <h1 class="h5 fw-semibold mb-2">This page is private</h1>
        <p class="text-muted mb-4" style="font-size:14px; line-height:1.6;">
            You need to be logged in to view your dashboard.
            Your session may have expired, or you haven't signed in yet.
        </p>

        <a href="{{ url_for('user.login_page') }}"
           class="btn btn-primary w-100 mb-3 fw-semibold"
           style="padding: 10px;">
            Log in to continue
        </a>

        <p class="text-muted mb-0" style="font-size:13px;">
            Don't have an account?
            <a href="{{ url_for('user.signup_page') }}" class="text-primary fw-semibold text-decoration-none">
                Sign up here
            </a>
        </p>

    </div>
</body>
</html>
