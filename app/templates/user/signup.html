<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>User SignUp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <h1 class="h1 text-center text-dark my-3 "> Signup</h1>
    <blockquote class="blockquote text-center">Create your account to get started</blockquote>

    <div class="container m-auto bg-light rounded-2 p-4" style="max-width: 800px;">
        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        <form action="{{url_for('user.user_signup')}}" method="POST" enctype="multipart/form-data">
            <!-- name and email -->
            <div class="entry d-flex d-row gap-4 mb-3">
                <div class="d-flex flex-column gap-0 w-50">
                    <label class="form-label" for="name">Full Name:</label>
                    <input class="form-control" type="text" name="name" id="name" placeholder="Your full name" required>
                </div>

                <div class="d-flex flex-column gap-0 w-50">
                    <label class="form-label" for="email">Email:</label>
                    <input class="form-control" type="email" name="email" id="email" placeholder="Your email" required>
                </div>
            </div>
            <!-- password and confirm password -->
            <div class="entry d-flex d-row gap-4 mb-3">
                <div class="d-flex flex-column gap-0 w-50">
                    <label class="form-label" for="password">Password:</label>
                    <input class="form-control" type="password" name="password" id="password"
                        placeholder="Your password" required>
                </div>

                <div class="d-flex flex-column gap-0 w-50">
                    <label class="form-label" for="confirm_password">Confirm Password:</label>
                    <input class="form-control" type="password" name="confirm_password" id="confirm_password"
                        placeholder="Confirm your password" required>
                </div>
            </div>

            <!-- phone and age -->
            <div class="entry d-flex d-row gap-4 mb-3">
                <div class="d-flex flex-column gap-0 w-50">
                    <label class="form-label" for="phone">Phone:</label>
                    <input class="form-control" type="number" name="phone" id="phone" placeholder="Your phone number"
                        required maxlength="10" pattern="">
                </div>
                <div class="d-flex flex-column gap-0 w-50">
                    <label class="form-label" for="age">Age:</label>
                    <input class="form-control" type="number" name="age" id="age" placeholder="Your age" required>
                </div>
            </div>


            <!-- Gender and Course -->
            <div class="entry d-flex d-row gap-4 mb-3">
                <!-- Gender -->
                <div class="d-flex flex-column gap-0 w-50">
                    <label class="form-label">Gender:</label>

                    <div class="d-flex gap-4 mt-1">
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="gender" id="male" value="male" required>
                            <label class="form-check-label" for="male">Male</label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="gender" id="female" value="female"
                                required>
                            <label class="form-check-label" for="female">Female</label>
                        </div>
                    </div>
                </div>

                <!-- Course -->
                <div class="d-flex flex-column gap-0 w-50">
                    <label class="form-label" for="course">Course:</label>
                    <select class="form-select" name="course" id="course" required>
                        <option value="">Select your course</option>
                        <option value="BCA">BCA</option>
                        <option value="B.tech">B.tech</option>
                        <option value="MCA">MCA</option>
                        <option value="M.tech">M.tech</option>
                        <option value="B.Comm">B.Comm</option>
                    </select>
                </div>
            </div>

            <!-- photo -->
            <div class="entry gap-1 d-flex flex-column mb-3">
                <label class="form-label" for="user_photo">Upload Photo</label>
                <input class="form-control" type="file" name="user_photo" id="photo">
            </div>

            <div class="submit-btn w-100 d-flex justify-content-center mt-4">
                <button type="submit" class="btn btn-success m-auto px-4 rounded-pill fs-5">SignUp</button>
            </div>

            <p class="text-center text-muted mt-4">
                Already have an account?
                <a href="{{ url_for('user.login_page') }}">Login here</a>
            </p>

        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
